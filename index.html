<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFinance Pro v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        #slide-panel { transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1); }
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-slate-900 text-white p-5 pt-10 rounded-b-[2.5rem] shadow-lg">
        <div class="max-w-md mx-auto text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">Total Kekayaan</p>
            <h1 id="total-wealth" class="text-2xl font-extrabold tracking-tight mb-6">Rp 0</h1>
            
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-white/5 border border-white/10 p-2 rounded-xl">
                    <p class="text-[8px] text-blue-300 font-bold uppercase">Cash</p>
                    <p id="total-cash" class="font-bold text-[11px]">Rp 0</p>
                </div>
                <div class="bg-white/5 border border-white/10 p-2 rounded-xl">
                    <p class="text-[8px] text-amber-300 font-bold uppercase">Aset</p>
                    <p id="total-assets" class="font-bold text-[11px]">Rp 0</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white/5 border border-white/10 p-2 rounded-xl">
                    <p class="text-[8px] text-emerald-400 font-bold uppercase italic">+ Income (Apr)</p>
                    <p id="monthly-income" class="font-bold text-[11px]">Rp 0</p>
                </div>
                <div class="bg-white/5 border border-white/10 p-2 rounded-xl">
                    <p class="text-[8px] text-rose-400 font-bold uppercase italic">- Expense (Apr)</p>
                    <p id="monthly-expense" class="font-bold text-[11px]">Rp 0</p>
                </div>
            </div>

            <button onclick="window.promptUpdateGold()" class="mt-4 bg-slate-800 border border-slate-700 p-1.5 px-4 rounded-full inline-flex items-center gap-2 active:scale-95 transition">
                <i class="fa-solid fa-gem text-amber-400 text-[9px]"></i>
                <span id="display-gold-price" class="text-[9px] font-bold text-slate-300">Emas: Rp 0</span>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        <label class="w-full bg-white border border-slate-200 p-3 rounded-2xl flex items-center justify-center gap-3 cursor-pointer active:bg-slate-50 transition mb-6 shadow-sm">
            <i class="fa-solid fa-camera text-blue-500 text-sm"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Scan Receipt</span>
            <input type="file" id="receipt-upload" accept="image/*" capture="camera" class="hidden">
        </label>

        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="font-bold text-[10px] text-slate-400 uppercase tracking-widest">History</h3>
            <div class="flex items-center gap-1">
                <div class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[8px] text-slate-400 font-bold uppercase">Live</span>
            </div>
        </div>

        <div id="transaction-list" class="space-y-2"></div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 flex justify-center z-50 pointer-events-none px-6">
        <nav class="w-full max-w-[280px] bg-slate-900 shadow-2xl rounded-full p-1.5 flex justify-around items-center border border-white/10 pointer-events-auto">
            <button onclick="location.reload()" class="w-10 h-10 flex items-center justify-center text-blue-400">
                <i class="fa-solid fa-house-simple text-sm"></i>
            </button>
            <button onclick="window.openPanel('transaksi')" class="w-11 h-11 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-500/40 active:scale-90 transition">
                <i class="fa-solid fa-plus text-lg"></i>
            </button>
            <button class="w-10 h-10 flex items-center justify-center text-slate-500 opacity-40"><i class="fa-solid fa-chart-pie text-sm"></i></button>
        </nav>
    </div>

    <div id="overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden opacity-0 transition-all duration-300"></div>
    <div id="slide-panel" class="fixed bottom-0 left-0 right-0 bg-white z-50 rounded-t-[2.5rem] transform translate-y-full max-w-md mx-auto shadow-2xl max-h-[85vh] overflow-y-auto pb-10">
        <div class="p-6">
            <div class="w-8 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <div class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">Kategori</label>
                    <select id="input-category" onchange="window.handleCategoryChange()" class="w-full bg-slate-50 p-3 rounded-xl border border-slate-100 outline-none font-bold text-xs">
                        <option value="Pengeluaran">🔴 Pengeluaran</option>
                        <option value="Pemasukan">🟢 Pemasukan</option>
                        <option value="Aset Baru">💎 Aset Baru</option>
                    </select>
                </div>
                <div id="aset-type-section" class="hidden space-y-1">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tipe Aset</label>
                    <select id="input-aset-type" onchange="window.handleAsetTypeChange()" class="w-full bg-blue-50 p-3 rounded-xl border border-blue-100 outline-none font-bold text-xs text-blue-700">
                        <option value="Lainnya">Lainnya</option>
                        <option value="Emas">Emas (Semar)</option>
                        <option value="Tanah">Tanah</option>
                        <option value="Mobil">Kendaraan</option>
                    </select>
                </div>
                <div id="form-emas" class="hidden p-3 bg-amber-50 rounded-xl border border-amber-100">
                    <input type="number" id="gold-weight" oninput="window.calcEmas()" class="w-full bg-transparent outline-none font-bold text-sm" placeholder="Berat (Gram)">
                </div>
                <div id="form-tanah" class="hidden space-y-3 p-3 bg-emerald-50 rounded-xl border border-emerald-100">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="land-p" oninput="window.calcTanah()" class="p-2 rounded-lg outline-none text-xs" placeholder="Panjang (m)">
                        <input type="number" id="land-l" oninput="window.calcTanah()" class="p-2 rounded-lg outline-none text-xs" placeholder="Lebar (m)">
                    </div>
                    <input type="number" id="land-price" oninput="window.calcTanah()" class="w-full p-2 rounded-lg outline-none text-xs" placeholder="Harga/m2">
                    <input type="text" id="land-address" class="w-full p-2 rounded-lg outline-none text-[10px]" placeholder="Alamat">
                </div>
                <div id="form-mobil" class="hidden grid grid-cols-2 gap-2 p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <input type="text" id="car-merk" class="p-2 rounded-lg outline-none text-[10px]" placeholder="Merk/Tipe">
                    <input type="text" id="car-plate" class="p-2 rounded-lg outline-none text-[10px]" placeholder="Plat Nomor">
                </div>
                <div class="space-y-4">
                    <input type="text" id="input-name" class="w-full border-b border-slate-100 p-2 text-xs font-semibold outline-none focus:border-blue-500" placeholder="Keterangan...">
                    <input type="number" id="input-amount" class="w-full border-b border-slate-100 p-2 text-lg font-black text-slate-800 outline-none" placeholder="Nominal Rp">
                </div>
                <div id="preview-container" class="hidden rounded-xl overflow-hidden border">
                    <img id="image-preview" src="#" class="w-full h-24 object-cover">
                </div>
                <button type="button" id="btn-save" onclick="window.saveDataToFirebase()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl active:scale-95 transition text-[10px] uppercase tracking-widest shadow-xl">
                    Confirm & Save
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDt4yZbOO3oB_kfSlJPWzXCTg8CxZm2Y0",
            authDomain: "bus-managemen-5fca8.firebaseapp.com",
            databaseURL: "https://bus-managemen-5fca8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bus-managemen-5fca8",
            storageBucket: "bus-managemen-5fca8.appspot.com",
            appId: "1:138957839661:web:c2ed7d2ed6670c1e7987a4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        window.currentGoldPrice = parseInt(localStorage.getItem('saved_gold_price')) || 1450000;
        let selectedFile = null, currentEditId = null;

        window.updateGoldDisplay = function() {
            document.getElementById('display-gold-price').innerText = "Emas: Rp " + (window.currentGoldPrice/1000).toFixed(0) + "k/gr";
            localStorage.setItem('saved_gold_price', window.currentGoldPrice);
        };
        window.updateGoldDisplay();

        window.promptUpdateGold = function() {
            const p = prompt("Harga Emas Semar:", window.currentGoldPrice);
            if(p) { window.currentGoldPrice = parseInt(p); window.updateGoldDisplay(); }
        };

        window.handleCategoryChange = function() {
            const cat = document.getElementById('input-category').value;
            document.getElementById('aset-type-section').classList.toggle('hidden', cat !== "Aset Baru");
            if(cat !== "Aset Baru") window.hideAllSubForms();
        };

        window.hideAllSubForms = function() {
            document.getElementById('form-emas').classList.add('hidden');
            document.getElementById('form-tanah').classList.add('hidden');
            document.getElementById('form-mobil').classList.add('hidden');
        };

        window.handleAsetTypeChange = function() {
            const type = document.getElementById('input-aset-type').value;
            window.hideAllSubForms();
            if(type === "Emas") document.getElementById('form-emas').classList.remove('hidden');
            if(type === "Tanah") document.getElementById('form-tanah').classList.remove('hidden');
            if(type === "Mobil") document.getElementById('form-mobil').classList.remove('hidden');
        };

        window.calcEmas = function() {
            const w = parseFloat(document.getElementById('gold-weight').value) || 0;
            document.getElementById('input-name').value = `Emas (${w}g)`;
            document.getElementById('input-amount').value = w * window.currentGoldPrice;
        };

        window.calcTanah = function() {
            const p = parseFloat(document.getElementById('land-p').value) || 0, l = parseFloat(document.getElementById('land-l').value) || 0, pr = parseFloat(document.getElementById('land-price').value) || 0;
            document.getElementById('input-name').value = `Tanah (${p*l}m2)`;
            document.getElementById('input-amount').value = (p*l) * pr;
        };

        window.openPanel = function(type, id = null, data = null) {
            const p = document.getElementById('slide-panel'), o = document.getElementById('overlay');
            if(id) {
                currentEditId = id;
                document.getElementById('input-name').value = data.name;
                document.getElementById('input-amount').value = data.amount;
                document.getElementById('input-category').value = data.category;
            } else {
                currentEditId = null;
                document.getElementById('input-name').value = "";
                document.getElementById('input-amount').value = "";
                document.getElementById('input-category').value = "Pengeluaran";
                window.hideAllSubForms();
            }
            window.handleCategoryChange();
            o.classList.remove('hidden');
            setTimeout(() => { o.classList.add('opacity-100'); p.classList.remove('translate-y-full'); }, 50);
        };

        window.closePanel = function() {
            document.getElementById('slide-panel').classList.add('translate-y-full');
            document.getElementById('overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 300);
        };

        window.saveDataToFirebase = async function() {
            const btn = document.getElementById('btn-save'), name = document.getElementById('input-name').value, amount = parseFloat(document.getElementById('input-amount').value), cat = document.getElementById('input-category').value;
            if(!name || isNaN(amount)) return;
            btn.disabled = true; btn.innerText = "Saving...";
            try {
                let img = "";
                if(selectedFile) {
                    const r = sRef(storage, `smartkeuangan/img_${Date.now()}`);
                    const u = await uploadBytes(r, selectedFile);
                    img = await getDownloadURL(u.ref);
                }
                const p = { name, amount, category: cat, imageUrl: img, timestamp: Date.now(), waktu: new Date().toLocaleString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) };
                if(currentEditId) await update(ref(db, `smartkeuangan/${currentEditId}`), p);
                else await push(ref(db, 'smartkeuangan'), p);
                selectedFile = null; document.getElementById('preview-container').classList.add('hidden'); window.closePanel();
            } catch(e) { alert(e.message); } finally { btn.disabled = false; btn.innerText = "Confirm & Save"; }
        };

        window.deleteTransaction = function(id) { if(confirm("Hapus?")) remove(ref(db, `smartkeuangan/${id}`)); };

        onValue(ref(db, 'smartkeuangan'), (s) => {
            let h = ""; 
            let wealth = 0, assets = 0, cash = 0, mIncome = 0, mExpense = 0;
            const d = s.val();
            const now = new Date();
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
            const currentMonthStr = monthNames[now.getMonth()];

            if(d) {
                const items = Object.keys(d).map(k => ({id:k, ...d[k]}));
                items.sort((a,b) => b.timestamp - a.timestamp);
                
                items.forEach(i => {
                    const inc = i.category === "Pemasukan", ast = i.category === "Aset Baru", exp = i.category === "Pengeluaran";
                    
                    if(inc) cash += i.amount;
                    else if(ast) assets += i.amount;
                    else cash -= i.amount;

                    // HITUNG BULAN BERJALAN
                    if(i.waktu.includes(currentMonthStr)) {
                        if(inc) mIncome += i.amount;
                        if(exp) mExpense += i.amount;
                    }

                    h += `
                    <div class="bg-white p-3 px-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 ${inc?'bg-emerald-50 text-emerald-500':ast?'bg-blue-50 text-blue-500':'bg-rose-50 text-rose-500'} rounded-lg flex items-center justify-center text-[10px]">
                                <i class="fa-solid ${inc?'fa-arrow-down':ast?'fa-gem':'fa-receipt'}"></i>
                            </div>
                            <div>
                                <p class="font-bold text-[11px] text-slate-800 leading-tight">${i.name}</p>
                                <div class="flex items-center gap-2 mt-0.5 text-[8px] font-bold text-slate-400 uppercase">
                                    <span>${i.waktu}</span>
                                    <button onclick='window.openPanel("edit", "${i.id}", ${JSON.stringify(i)})' class="text-blue-500">Edit</button>
                                    <button onclick='window.deleteTransaction("${i.id}")' class="text-slate-300">Del</button>
                                    ${i.imageUrl?`<a href="${i.imageUrl}" target="_blank" class="text-emerald-500 underline">Bukti</a>`:''}
                                </div>
                            </div>
                        </div>
                        <p class="font-bold ${inc?'text-emerald-500':ast?'text-blue-500':'text-slate-700'} text-[11px]">
                            ${inc?'+':ast?'':'–'} ${i.amount.toLocaleString('id-ID')}
                        </p>
                    </div>`;
                });
                wealth = cash + assets;
            }
            
            document.getElementById('transaction-list').innerHTML = h || '<p class="text-center text-slate-300 py-10 text-[10px]">No data available</p>';
            document.getElementById('total-wealth').innerText = "Rp " + wealth.toLocaleString('id-ID');
            document.getElementById('total-cash').innerText = "Rp " + cash.toLocaleString('id-ID');
            document.getElementById('total-assets').innerText = "Rp " + assets.toLocaleString('id-ID');
            document.getElementById('monthly-income').innerText = "Rp " + mIncome.toLocaleString('id-ID');
            document.getElementById('monthly-expense').innerText = "Rp " + mExpense.toLocaleString('id-ID');
        });

        document.getElementById('receipt-upload').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) {
                document.getElementById('image-preview').src = URL.createObjectURL(selectedFile);
                document.getElementById('preview-container').classList.remove('hidden');
                setTimeout(() => window.openPanel('transaksi'), 300);
            }
        });
        document.getElementById('overlay').onclick = window.closePanel;
    </script>
</body>
</html>
